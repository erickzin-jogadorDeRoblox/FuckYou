<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oi Bruna 💜</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/6424/6424306.png">
</head>
<body>
    <div class="container">
        <h1>Oie <span class="nome">𝐵𝓇𝓊𝓃𝒶</span></h1>
        <p>sabia que as chances de eu te amar são de <span id="chances">1 em mais de 500 pessoas?</span></p>
        <p>Sim, são raras demais pra te amar</p>
        <p>por isso eu te quero, muito</p>
        
        <h1>Alias, dá seu cuzinho pfvrrr</h1>
        <button id="cuSim">Sim ❤️❤️❤️</button>
        <button id="cuNao">Não 🥀💔💔</button>
        <div id="cuResposta"></div>
        <h2>akakakakaak, ta tentando <span id="tentacao">(faz alguma coisa pra esse texto aqui aparecer)</span></h2>
        
        <h1 style="margin-top: 25px; font-size: 1rem; color: #888;">Essa porra demorou pra caralho!</h1>
    </div>
    <script>
        const cuSim = document.getElementById('cuSim');
        const cuNao = document.getElementById('cuNao');
        const resposta = document.getElementById('cuResposta');
        const tentacao = document.getElementById("tentacao");

        function moverBotao(btn) {
            if (getComputedStyle(btn).position === 'static') {
                btn.style.position = 'fixed';
            }
        
            const viewport = window.visualViewport || window;
            const larguraJanela = viewport.width || window.innerWidth;
            const alturaJanela = viewport.height || window.innerHeight;
        
            const larguraBtn = btn.offsetWidth;
            const alturaBtn = btn.offsetHeight;
        
            const maxX = Math.max(0, larguraJanela - larguraBtn);
            const maxY = Math.max(0, alturaJanela - alturaBtn);
        
            const novaX = Math.random() * maxX;
            const novaY = Math.random() * maxY;
        
            btn.style.left = novaX + 'px';
            btn.style.top = novaY + 'px';
        }

        function mostrarResposta(texto) {
            resposta.textContent = texto;
        }

        
        // Botão NÃO - foge do cursor/dedo
        cuNao.addEventListener('mouseenter', () => {
            moverBotao(cuNao);
            navigator.vibrate(500);
            mostrarResposta("Achava mesmo que seria facil?");
            tentacao.textContent = "clicar no não?";
        });

        cuNao.addEventListener('touchstart', (e) => {
            e.preventDefault();
            moverBotao(cuNao);
            navigator.vibrate(500);
            mostrarResposta("Achava mesmo que seria facil?");
            tentacao.textContent = "clicar no não?";
        });

        cuNao.addEventListener('click', (e) => {
            e.preventDefault();
            moverBotao(cuNao);
            navigator.vibrate(500)
            mostrarResposta("Hahahahhaha???");
            tentacao.textContent = "clicar no não?";
        });

        cuSim.addEventListener('click', async () => {
            navigator.vibrate(1000);
            mostrarResposta('Aaa que bom! Fico feliz 😊💜'); 
             document.getElementById("tentacao").textContent = ", espera... HAHAAHAHAH, ai sim 😋";
        });

        cuSim.addEventListener('mouseenter', () => {
            navigator.vibrate(500);
            mostrarResposta("Clica ai mesmo");
        });

    </script>
</body>
</html>
